<!DOCTYPE html>
<html>
<head><link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"></head>
<body class="bg-light p-5">
    <div class="container" style="max-width: 600px;">
        <div class="card shadow border-0 overflow-hidden">
            <div class="card-header bg-primary text-white fw-bold">🔍 ASSET SPECIFICATIONS</div>
            <div class="card-body">
                <table class="table table-sm">
                    <tr><th>Tracking:</th><td>{{ asset.tracking_number }}</td></tr>
                    <tr><th>Category:</th><td>{{ asset.asset_type }}</td></tr>
                    <tr><th>Brand/Model:</th><td>{{ asset.cpu_name }}</td></tr>
                    <tr><th>S/N:</th><td>{{ asset.serial_number }}</td></tr>
                    <tr><th>RAM:</th><td>{{ asset.ram_size }}</td></tr>
                    <tr><th>Storage:</th><td>{{ asset.storage_type }}</td></tr>
                    <tr><th>Location:</th><td>{{ asset.location }}</td></tr>
                    <tr><th>Status:</th><td><span class="badge bg-info">{{ asset.status }}</span></td></tr>
                </table>
                <a href="/" class="btn btn-secondary w-100 mt-3">Back to Dashboard</a>
            </div>
        </div>
    </div>
</body>
</html>

<view html>
<html>
<head><link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"></head>
<body class="bg-light p-5">
    <div class="container card p-4 shadow-sm border-0" style="max-width: 500px;">
        <h4 class="fw-bold text-center mb-4">🖥️ Hardware Specifications</h4>
        <h5>{{ asset.cpu_name }}</h5>
        <p><strong>Tracking No:</strong> {{ asset.tracking_number }}</p>
        <p><strong>S/N:</strong> {{ asset.serial_number }}</p>
        <p><strong>Specs:</strong> {{ asset.ram_size }} / {{ asset.storage_type }}</p>
        <p><strong>Location:</strong> {{ asset.location }}</p>
        <p><strong>Status:</strong> {{ asset.status }}</p>
        <hr>
        <div class="text-center"><a href="/" class="btn btn-primary w-100">Back to Dashboard</a></div>
    </div>
</body>
</html>

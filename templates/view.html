<!DOCTYPE html>
<html>
<head><link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"></head>
<body class="bg-light p-5">
    <div class="container" style="max-width: 600px;">
        <div class="card shadow border-0">
            <div class="card-header bg-primary text-white fw-bold">🔍 ASSET SPECIFICATIONS</div>
            <div class="card-body">
                <p><strong>Tracking:</strong> {{ asset.tracking_number }}</p>
                <p><strong>Serial:</strong> {{ asset.serial_number }}</p>
                <p><strong>Brand/Model:</strong> {{ asset.cpu_name }}</p>
                <hr>
                <p><strong>RAM:</strong> {{ asset.ram_size }}</p>
                <p><strong>Storage:</strong> {{ asset.storage_type }}</p>
                <p><strong>Status:</strong> {{ asset.status }}</p>
                <a href="/" class="btn btn-secondary w-100 mt-3">Back to Dashboard</a>
            </div>
        </div>
    </div>
</body>
</html>

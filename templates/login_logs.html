<!DOCTYPE html>
<html>
<head>
    <title>Access Logs</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">
    <nav class="navbar navbar-dark bg-dark p-3 mb-4 shadow"><div class="container d-flex justify-content-between">
        <h4 class="text-white mb-0">SYSTEM ACCESS LOGS</h4>
        <a href="/" class="btn btn-warning fw-bold">Back to Dashboard</a>
    </div></nav>
    <div class="container">
        <div class="card shadow border-0 rounded-4 overflow-hidden">
            <table class="table table-hover align-middle mb-0">
                <thead class="table-light"><tr><th>Staff Name</th><th>Email</th><th>Login Time</th></tr></thead>
                <tbody>
                    {% for log in logs %}
                    <tr><td><b>{{ log.full_name }}</b></td><td>{{ log.email }}</td><td class="text-muted">{{ log.login_time }}</td></tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
</body>
</html>

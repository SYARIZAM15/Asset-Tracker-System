<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><title>Asset Info</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container mt-5">
        <div class="card shadow mx-auto" style="max-width: 500px;">
            <div class="card-header bg-dark text-white"><h5>Asset Details</h5></div>
            <div class="card-body">
                <!-- Use keys like 'cpu_name' and 'serial_number' -->
                <p><strong>Name:</strong> {{ data.cpu_name }} | <strong>S/N:</strong> {{ data.serial_number }}</p>
                <p><strong>RAM:</strong> {{ data.ram_size }} | <strong>Storage:</strong> {{ data.storage_type }}</p>
                <p><strong>Location:</strong> {{ data.location }}</p>
                <hr>
                <h6>📜 Maintenance History</h6>
                <div class="bg-light p-2 border rounded" style="white-space: pre-wrap; font-size: 0.85rem;">
                    {{ data.maintenance_logs if data.maintenance_logs else 'No logs yet' }}
                </div>
            </div>
            <div class="card-footer d-flex justify-content-between">
                <a href="/assets" class="btn btn-sm btn-secondary">List</a>
                <a href="/edit/{{ data.id }}" class="btn btn-sm btn-warning">Edit/Log</a>
            </div>
        </div>
    </div>
</body>
</html>

<asset html>
<html lang="en">
<head>
    <meta charset="UTF-8"><title>Asset Info</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container mt-5">
        <div class="card shadow mx-auto" style="max-width: 500px;">
            <div class="card-header bg-dark text-white"><h5>Asset Details</h5></div>
            <div class="card-body">
                <p><strong>Name:</strong> {{ data[1] }} | <strong>S/N:</strong> {{ data[2] }}</p>
                <p><strong>RAM:</strong> {{ data[4] }} | <strong>Storage:</strong> {{ data[5] }}</p>
                <p><strong>Location:</strong> {{ data[6] }}</p>
                <hr>
                <h6>📜 Maintenance History</h6>
                <div class="bg-light p-2 border rounded" style="white-space: pre-wrap; font-size: 0.85rem;">{{ data[7] if data[7] else 'No logs yet' }}</div>
            </div>
            <div class="card-footer d-flex justify-content-between">
                <a href="/assets" class="btn btn-sm btn-secondary">List</a>
                <a href="/edit/{{ data[0] }}" class="btn btn-sm btn-warning">Edit/Log</a>
            </div>
        </div>
    </div>
</body>
</html>

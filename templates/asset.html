<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Asset Details</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container mt-5">
        <div class="card shadow mx-auto" style="max-width: 450px;">
            <div class="card-header bg-dark text-white">
                <h5 class="mb-0">Asset Information</h5>
            </div>
            <div class="card-body">
                <p><strong>CPU Name:</strong> {{ data['cpu_name'] }}</p>
                <p><strong>Serial Number:</strong> <code>{{ data['serial_number'] }}</code></p>
                <p><strong>Status:</strong> {{ data['status'] }}</p>
                <hr>
                <p class="small text-muted mb-1">Scan History: {{ scan }} times</p>
                <p class="small text-muted">Last Logged: {{ data['last_updated'] }}</p>
            </div>
            <div class="card-footer d-flex justify-content-between">
                <a href="/assets" class="btn btn-sm btn-secondary">Back to List</a>
                <a href="/" class="btn btn-sm btn-primary">Home</a>
            </div>
        </div>
    </div>
</body>
</html>

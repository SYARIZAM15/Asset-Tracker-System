<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Asset Details</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container mt-4">
        <div class="card shadow-sm mx-auto" style="max-width: 500px;">
            <div class="card-header bg-dark text-white d-flex justify-content-between">
                <h5 class="mb-0">Asset Details</h5>
                <span class="badge bg-info">ID: {{ data[0] }}</span>
            </div>
            <div class="card-body">
                <div class="mb-3">
                    <label class="text-muted small">CPU Name</label>
                    <p class="h5">{{ data[1] }}</p>
                </div>
                
                <div class="mb-3">
                    <label class="text-muted small">Serial Number</label>
                    <p><code>{{ data[2] }}</code></p>
                </div>

                <div class="mb-3">
                    <label class="text-muted small">Status</label>
                    <div>
                        {% if data[3] == "Working" %}
                            <span class="btn btn-sm btn-success disabled">🟢 Working</span>
                        {% elif data[3] == "Faulty" %}
                            <span class="btn btn-sm btn-danger disabled">🔴 Faulty</span>
                        {% else %}
                            <span class="btn btn-sm btn-warning disabled text-dark">🟡 Maintenance</span>
                        {% endif %}
                    </div>
                </div>

                <hr>

                <div class="row text-center">
                    <div class="col border-end">
                        <label class="text-muted small d-block">Scans</label>
                        <strong>{{ scan }}</strong>
                    </div>
                    <div class="col">
                        <label class="text-muted small d-block">Last Updated</label>
                        <strong>{{ data[5] }}</strong>
                    </div>
                </div>
            </div>
            <div class="card-footer d-flex justify-content-around">
                <a href="/assets" class="btn btn-sm btn-outline-primary">📋 Full List</a>
                <a href="/" class="btn btn-sm btn-outline-secondary">🏠 Home</a>
            </div>
        </div>
    </div>
</body>
</html>

<add html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register Asset</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card shadow border-0">
                    <div class="card-header bg-primary text-white text-center py-3">
                        <h4 class="mb-0">🖥️ JPKN Asset Registration</h4>
                    </div>
                    <div class="card-body p-4">
                        <form action="/add" method="POST">
                            <div class="mb-3">
                                <label class="form-label fw-bold">CPU Name / Model</label>
                                <input type="text" name="cpu_name" class="form-control" placeholder="e.g. HP ProDesk 600" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label fw-bold">Serial Number</label>
                                <input type="text" name="serial" class="form-control" placeholder="S/N" required>
                            </div>
                            <div class="mb-4">
                                <label class="form-label fw-bold">Status</label>
                                <select name="status" class="form-select">
                                    <option value="Working">Working</option>
                                    <option value="Faulty">Faulty</option>
                                    <option value="Maintenance">Maintenance</option>
                                </select>
                            </div>
                            <div class="d-grid gap-2">
                                <button type="submit" class="btn btn-primary">Register & Generate QR</button>
                                <a href="/assets" class="btn btn-outline-secondary">View All Assets</a>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>

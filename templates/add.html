<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        .header-blue { background: #0d6efd; color: white; padding: 15px; border-radius: 8px 8px 0 0; font-weight: bold; }
        .card { border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); max-width: 600px; margin: 50px auto; }
    </style>
</head>
<body class="bg-light">
    <div class="card">
        <div class="header-blue">➕ Add New Hardware</div>
        <form method="POST" class="p-4">
            <div class="row">
                <div class="col"><label>CPU Name</label><input type="text" name="cpu_name" class="form-control" required></div>
                <div class="col"><label>Serial Number</label><input type="text" name="serial_number" class="form-control" required></div>
            </div>
            <div class="row mt-3">
                <div class="col"><label>RAM (GB)</label><input type="text" name="ram_size" value="8GB" class="form-control"></div>
                <div class="col"><label>Storage</label><input type="text" name="storage_type" value="SSD/HDD" class="form-control"></div>
                <div class="col">
                    <label>Status</label>
                    <select name="status" class="form-select">
                        <option value="Working">Working</option>
                        <option value="Faulty">Faulty</option>
                    </select>
                </div>
            </div>
            <div class="mt-3">
                <label>Location / Office</label>
                <input type="text" name="location" placeholder="e.g. Jabatan Perhutanan" class="form-control">
            </div>
            <button type="submit" class="btn btn-success w-100 mt-4">Save Asset</button>
        </form>
    </div>
</body>
</html>

<add html>
<html>
<head><link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"></head>
<body class="bg-light p-5">
    <div class="card shadow border-0 mx-auto" style="max-width: 600px;">
        <div class="card-header bg-primary text-white fw-bold">➕ REGISTER ASSET</div>
        <form method="POST" class="card-body p-4">
            <div class="mb-3">
                <label class="fw-bold">Asset Category</label>
                <select name="asset_type" class="form-select" required>
                    <option value="Laptop">Laptop</option>
                    <option value="PC">PC</option>
                    <option value="Monitor">Monitor</option>
                    <option value="Printer">Printer</option>
                </select>
            </div>
            <div class="row">
                <div class="col"><label class="fw-bold">Brand/Model</label><input type="text" name="cpu_name" class="form-control" placeholder="e.g. Dell Optiplex" required></div>
                <div class="col"><label class="fw-bold">Serial Number</label><input type="text" name="serial_number" class="form-control" required></div>
            </div>
            
            <div class="row mt-3">
                <div class="col">
                    <label class="fw-bold">RAM Size</label>
                    <input list="ramOptions" name="ram_size" class="form-control" placeholder="Select...">
                    <datalist id="ramOptions">
                        <option value="4GB"><option value="8GB"><option value="12GB"><option value="16GB"><option value="32GB">
                    </datalist>
                </div>
                <div class="col">
                    <label class="fw-bold">Storage</label>
                    <input list="storageOptions" name="storage_type" class="form-control" placeholder="Select...">
                    <datalist id="storageOptions">
                        <option value="SSD 128GB"><option value="SSD 256GB"><option value="SSD 512GB"><option value="SSD 1TB">
                        <option value="HDD 500GB"><option value="HDD 1TB">
                    </datalist>
                </div>
            </div>

            <div class="mt-3">
                <label class="fw-bold">Status</label>
                <select name="status" class="form-select">
                    <option value="Working">Working</option>
                    <option value="Maintenance">Maintenance</option>
                    <option value="Faulty">Faulty</option>
                </select>
            </div>
            <div class="mt-3"><label class="fw-bold">Agency</label><input type="text" name="location" placeholder="e.g. Jabatan Perhutanan" class="form-control"></div>
            <button type="submit" class="btn btn-success w-100 mt-4">Save Asset</button>
        </form>
    </div>
</body>
</html>

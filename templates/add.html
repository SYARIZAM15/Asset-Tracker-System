<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><title>Add Asset</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container mt-5">
        <div class="card shadow-sm mx-auto" style="max-width: 600px;">
            <div class="card-header bg-primary text-white"><h5>➕ Add New Hardware</h5></div>
            <div class="card-body">
                <form action="/add" method="POST">
                    <div class="row">
                        <div class="col-md-6 mb-3"><label>CPU Name</label><input type="text" name="cpu_name" class="form-control" required></div>
                        <div class="col-md-6 mb-3"><label>Serial Number</label><input type="text" name="serial" class="form-control" required></div>
                    </div>
                    <div class="row">
                        <div class="col-md-4 mb-3"><label>RAM (GB)</label><input type="text" name="ram" class="form-control" placeholder="8GB"></div>
                        <div class="col-md-4 mb-3"><label>Storage</label><input type="text" name="storage" class="form-control" placeholder="SSD/HDD"></div>
                        <div class="col-md-4 mb-3"><label>Status</label>
                            <select name="status" class="form-select"><option>Working</option><option>Faulty</option><option>Maintenance</option></select>
                        </div>
                    </div>
                    <div class="mb-3"><label>Location / Office</label><input type="text" name="location" class="form-control" placeholder="e.g. Jabatan Perhutanan"></div>
                    <button type="submit" class="btn btn-success w-100">Save Asset</button>
                </form>
            </div>
        </div>
    </div>
</body>
</html>

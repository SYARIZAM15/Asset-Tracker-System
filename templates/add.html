<add html>
<html lang="en">
<head>
    <meta charset="UTF-8"><title>JTDI - Register Hardware</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">
    <nav class="navbar navbar-dark bg-dark mb-4 p-3"><div class="container"><a class="navbar-brand" href="/">🏢 JTDI ASSET TRACKER</a></div></nav>
    <div class="container" style="max-width: 600px;">
        <div class="card shadow-sm p-4">
            <h3 class="mb-4 fw-bold text-center">Register New Hardware</h3>
            <form action="/add" method="POST">
                <div class="mb-3"><label class="form-label fw-bold">Asset Category</label>
                    <select name="asset_type" class="form-select">
                        <option value="Laptop">Laptop</option><option value="PC">PC</option><option value="Monitor">Monitor</option><option value="Printer">Printer</option>
                    </select>
                </div>
                <div class="mb-3"><label class="form-label fw-bold">Brand & Model</label><input type="text" name="cpu_name" class="form-control" required></div>
                <div class="mb-3"><label class="form-label fw-bold">Serial Number</label><input type="text" name="serial_number" class="form-control" required></div>
                <div class="row"><div class="col"><label class="small fw-bold">RAM</label><input type="text" name="ram_size" class="form-control"></div><div class="col"><label class="small fw-bold">Storage</label><input type="text" name="storage_type" class="form-control"></div></div>
                <div class="mb-3 mt-3"><label class="form-label fw-bold">Location</label><input type="text" name="location" class="form-control"></div>
                <div class="mb-4"><label class="form-label fw-bold">Status</label>
                    <select name="status" class="form-select"><option value="Working">Working</option><option value="Maintenance">Maintenance</option><option value="Faulty">Faulty</option></select>
                </div>
                <button type="submit" class="btn btn-primary w-100 py-2 fw-bold">Save to Database</button>
                <a href="/" class="btn btn-link w-100 mt-2">Cancel</a>
            </form>
        </div>
    </div>
</body>
</html>

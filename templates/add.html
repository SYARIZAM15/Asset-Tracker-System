<add html>
<html>
<head><link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"></head>
<body class="bg-light p-5">
    <div class="container" style="max-width: 600px;">
        {% with messages = get_flashed_messages() %}{% if messages %}{% for m in messages %}
        <div class="alert alert-warning alert-dismissible fade show shadow-sm mb-4" role="alert">
            <strong>⚠️ Reminder:</strong> {{ m }} <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
        {% endfor %}{% endif %}{% endwith %}

        <div class="card shadow border-0">
            <div class="card-header bg-primary text-white fw-bold">➕ REGISTER ASSET</div>
            <form method="POST" class="card-body p-4">
                <div class="mb-3"><label class="fw-bold">Asset Category</label>
                    <select name="asset_type" class="form-select" required>
                        <option value="Laptop">Laptop</option><option value="PC">PC</option>
                        <option value="Monitor">Monitor</option><option value="Printer">Printer</option>
                    </select>
                </div>
                <div class="mb-3"><label class="fw-bold">Tracking Number</label><input type="text" name="tracking_number" class="form-control" placeholder="e.g. JPKN/SAN/2026/001"></div>
                <div class="row g-3">
                    <div class="col-md-6"><label class="fw-bold">Brand/Model</label><input type="text" name="cpu_name" class="form-control" required></div>
                    <div class="col-md-6"><label class="fw-bold">Serial Number</label><input type="text" name="serial_number" class="form-control" required></div>
                </div>
                <div class="row g-3 mt-1">
                    <div class="col-md-6"><label class="fw-bold">RAM Size</label><input list="ramOpt" name="ram_size" class="form-control"><datalist id="ramOpt"><option value="4GB"><option value="8GB"><option value="16GB"><option value="32GB"></datalist></div>
                    <div class="col-md-6"><label class="fw-bold">Storage</label><input list="stOpt" name="storage_type" class="form-control">
                        <datalist id="stOpt">
                            <option value="SSD 256GB"><option value="SSD 512GB"><option value="SSD 1TB">
                            <option value="HDD 500GB"><option value="HDD 1TB"><option value="HDD 2TB">
                        </datalist>
                    </div>
                </div>
                <div class="mt-3"><label class="fw-bold">Agency</label><input type="text" name="location" class="form-control" placeholder="Jabatan Perhutanan"></div>
                <div class="mt-3"><label class="fw-bold">Status</label>
                    <select name="status" class="form-select"><option value="Working">Working</option><option value="Maintenance">Maintenance</option><option value="Faulty">Faulty</option></select>
                </div>
                <button type="submit" class="btn btn-success w-100 mt-4 fw-bold">Save Asset to System</button>
            </form>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

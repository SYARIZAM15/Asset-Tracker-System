<add html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>JTDI - Register Hardware</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">
    <nav class="navbar navbar-dark bg-dark mb-4 p-3">
        <div class="container">
            <a class="navbar-brand" href="/">🏢 JTDI ASSET TRACKER</a>
        </div>
    </nav>

    <div class="container" style="max-width: 600px;">
        <div class="card shadow-sm p-4">
            <h3 class="mb-4 fw-bold text-center">Register New Hardware</h3>
            
            {% with messages = get_flashed_messages() %}
              {% if messages %}
                {% for message in messages %}
                  <div class="alert alert-danger">{{ message }}</div>
                {% endfor %}
              {% endif %}
            {% endwith %}

            <form action="/add" method="POST">
                <div class="mb-3">
                    <label class="form-label fw-bold">Asset Category</label>
                    <select name="asset_type" class="form-select">
                        <option value="Laptop">Laptop</option>
                        <option value="PC">PC / Desktop</option>
                        <option value="Monitor">Monitor</option>
                        <option value="Printer">Printer</option>
                    </select>
                </div>

                <div class="mb-3">
                    <label class="form-label fw-bold">Brand & Model</label>
                    <input type="text" name="cpu_name" class="form-control" placeholder="e.g. Dell XPS 15 9570" required>
                </div>

                <div class="mb-3">
                    <label class="form-label fw-bold">Serial Number (S/N)</label>
                    <input type="text" name="serial_number" class="form-control" placeholder="e.g. sn2143658709" required>
                </div>

                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label fw-bold">RAM Size</label>
                        <input type="text" name="ram_size" class="form-control" placeholder="16GB">
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label fw-bold">Storage Type</label>
                        <input type="text" name="storage_type" class="form-control" placeholder="512GB SSD">
                    </div>
                </div>

                <div class="mb-3">
                    <label class="form-label fw-bold">Current Location</label>
                    <input type="text" name="location" class="form-control" placeholder="Office / Section">
                </div>

                <div class="mb-4">
                    <label class="form-label fw-bold">Asset Status</label>
                    <select name="status" class="form-select">
                        <option value="Working">Working</option>
                        <option value="Maintenance">Maintenance</option>
                        <option value="Faulty">Faulty</option>
                    </select>
                </div>

                <div class="d-grid gap-2">
                    <button type="submit" class="btn btn-primary fw-bold py-2">Save to Database</button>
                    <a href="/" class="btn btn-outline-secondary">Cancel</a>
                </div>
            </form>
        </div>
    </div>
</body>
</html>

<qr_display html>
<html>
<head>
    <title>Print Label</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        @media print {
            body * { visibility: hidden; }
            .print-area, .print-area * { visibility: visible; }
            .print-area { position: absolute; left: 0; top: 0; width: 2in; height: 2in; text-align: center; border: 1px solid #eee; }
            .no-print { display: none; }
        }
    </style>
</head>
<body class="bg-light p-5">
    <div class="print-area bg-white p-2 d-inline-block shadow-sm">
        <div style="font-size: 10px; font-weight: bold;">JPKN PROPERTY #{{ id }}</div>
        <img src="data:image/png;base64,{{ img_str }}" style="width: 1.3in;">
        <div style="font-size: 9px; font-family: monospace;">S/N: {{ sn }}</div>
    </div>
    <div class="mt-4 no-print">
        <button onclick="window.print()" class="btn btn-success">🖨️ Print Label</button>
        <a href="/assets" class="btn btn-secondary">Back</a>
    </div>
</body>
</html>

<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Asset QR Code</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="bg-light d-flex align-items-center justify-content-center" style="height: 100vh;">
    <div class="card p-5 text-center shadow-lg border-0" style="max-width: 500px;">
        <h3 class="fw-bold mb-4">Hardware QR Code</h3>
        <p class="text-muted mb-4 small">Scan to view specifications and maintenance history instantly.</p>
        
        <div class="bg-white p-3 rounded mb-4">
            <img src="data:image/png;base64,{{ qr_code }}" class="img-fluid" alt="QR Code">
        </div>
        
        <div class="d-grid gap-2">
            <button onclick="window.print()" class="btn btn-dark fw-bold">Print QR Label</button>
            <a href="/" class="btn btn-outline-secondary">Return to Dashboard</a>
        </div>
    </div>
</body>
</html>

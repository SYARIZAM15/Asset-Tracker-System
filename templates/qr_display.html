<!DOCTYPE html>
<html lang="en">
<head>
    <title>QR Generated</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light text-center py-5">
    <div class="container">
        <div class="card shadow-sm mx-auto" style="max-width: 400px;">
            <div class="card-body py-4">
                <h3 class="text-success mb-3">✅ Registered!</h3>
                <p class="text-muted">Print and attach this QR to the PC.</p>
                <img src="data:image/png;base64,{{ img_str }}" class="img-fluid border p-3 mb-4 rounded bg-white" style="width: 250px;">
                <div class="d-grid gap-2">
                    <button onclick="window.print()" class="btn btn-outline-dark">Print Label</button>
                    <a href="/assets" class="btn btn-primary">Go to Inventory</a>
                </div>
            </div>
        </div>
    </div>
</body>
</html>

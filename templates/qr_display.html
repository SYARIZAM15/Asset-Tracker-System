<qr_display html>
<html>
<head>
    <title>Asset Registered</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light text-center mt-5">
    <div class="container">
        <div class="card mx-auto shadow" style="max-width: 400px;">
            <div class="card-body">
                <h3 class="text-success">✅ Success!</h3>
                <p>Asset #{{ id }} has been registered.</p>
                <img src="data:image/png;base64,{{ img_str }}" class="img-fluid border p-2 mb-3">
                <p class="text-muted small">Scan this QR code or print it to stick on the PC casing.</p>
                <hr>
                <a href="/" class="btn btn-primary">Add Another</a>
                <a href="/assets" class="btn btn-secondary">View Inventory</a>
            </div>
        </div>
    </div>
</body>
</html>

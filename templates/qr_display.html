<qr_display html>
<html>
<head><link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"></head>
<body class="bg-light d-flex align-items-center justify-content-center" style="height:100vh;">
    <div class="card p-4 text-center shadow">
        <h4 class="fw-bold mb-3">Asset QR Code</h4>
        <img src="data:image/png;base64,{{ qr_code }}" class="img-fluid mb-4" style="width:250px;">
        <div class="d-grid gap-2">
            <button onclick="window.print()" class="btn btn-dark">Print QR Code</button>
            <a href="/" class="btn btn-outline-secondary">Back to Home</a>
        </div>
    </div>
</body>
</html>

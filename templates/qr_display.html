<!DOCTYPE html>
<html>
<head><link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"></head>
<body class="bg-light d-flex align-items-center justify-content-center" style="height: 100vh;">
    <div class="text-center bg-white p-5 rounded shadow">
        <h4 class="fw-bold mb-4">Asset QR Code</h4>
        <img src="data:image/png;base64,{{ qr_code }}" class="img-fluid border mb-4" width="250">
        <div class="d-grid gap-2">
            <button onclick="window.print()" class="btn btn-primary">Print QR Code</button>
            <a href="/" class="btn btn-outline-secondary">Back</a>
        </div>
    </div>
</body>
</html>

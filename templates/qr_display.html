<qr_display html>
<html>
<head>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        .label-card { border: 2px solid #000; padding: 15px; width: 250px; text-align: center; background: white; margin: 20px auto; }
        @media print { .btn, h2 { display: none; } .label-card { border: none; } }
    </style>
</head>
<body class="bg-light p-5 text-center">
    <h2>Asset Label</h2>
    <div class="label-card">
        <strong>JPKN PROPERTY #{{ id }}</strong><br>
        <img src="data:image/png;base64,{{ qr_code }}" width="180" class="my-2"><br>
        <strong>S/N:</strong> {{ sn }}
    </div>
    <div class="mt-4">
        <button onclick="window.print()" class="btn btn-success">🖨️ Print Label</button>
        <a href="/" class="btn btn-secondary">Back</a>
    </div>
</body>
</html>

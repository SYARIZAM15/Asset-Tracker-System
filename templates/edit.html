<edit html>
<html>
<head>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        .header-yellow { background: #ffc107; color: black; padding: 15px; border-radius: 8px 8px 0 0; font-weight: bold; }
        .card { max-width: 600px; margin: 50px auto; border-radius: 8px; }
    </style>
</head>
<body class="bg-light">
    <div class="card shadow">
        <div class="header-yellow text-uppercase">Modify Asset: {{ asset.serial_number }}</div>
        <form method="POST" class="p-4">
            <div class="mb-3">
                <label class="form-label">CPU Name / Model</label>
                <input type="text" name="cpu_name" value="{{ asset.cpu_name }}" class="form-control">
            </div>
            <div class="row">
                <div class="col"><label>RAM Size</label><input type="text" name="ram_size" value="{{ asset.ram_size }}" class="form-control"></div>
                <div class="col"><label>Storage</label><input type="text" name="storage_type" value="{{ asset.storage_type }}" class="form-control"></div>
            </div>
            <div class="mt-3">
                <label>Location</label>
                <input type="text" name="location" value="{{ asset.location }}" class="form-control">
            </div>
            <div class="mt-3">
                <label>Status</label>
                <select name="status" class="form-select">
                    <option value="Working" {% if asset.status == 'Working' %}selected{% endif %}>Working</option>
                    <option value="Faulty" {% if asset.status == 'Faulty' %}selected{% endif %}>Faulty</option>
                </select>
            </div>
            <hr>
            <h6 class="fw-bold">Add Maintenance Log</h6>
            <select name="category" class="form-select mb-2">
                <option>Hardware Upgrade</option>
                <option>Software Repair</option>
                <option>General Maintenance</option>
            </select>
            <textarea name="action" class="form-control" rows="2" placeholder="Explain the change..."></textarea>
            <button type="submit" class="btn btn-primary w-100 mt-4">Save All Changes</button>
        </form>
    </div>
</body>
</html>

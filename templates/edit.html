<edit html>
<html lang="en">
<head>
    <meta charset="UTF-8"><title>Edit Asset</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container mt-5">
        <div class="card shadow-sm mx-auto" style="max-width: 600px;">
            <div class="card-header bg-warning"><h5>📝 Edit Asset: {{ asset[1] }}</h5></div>
            <div class="card-body">
                <form action="/edit/{{ asset[0] }}" method="POST">
                    <div class="mb-3"><label>Status</label>
                        <select name="status" class="form-select">
                            <option {% if asset[3] == 'Working' %}selected{% endif %}>Working</option>
                            <option {% if asset[3] == 'Faulty' %}selected{% endif %}>Faulty</option>
                            <option {% if asset[3] == 'Maintenance' %}selected{% endif %}>Maintenance</option>
                        </select>
                    </div>
                    <div class="row">
                        <div class="col-md-6 mb-3"><label>RAM Size</label><input type="text" name="ram" value="{{ asset[4] }}" class="form-control"></div>
                        <div class="col-md-6 mb-3"><label>Storage</label><input type="text" name="storage" value="{{ asset[5] }}" class="form-control"></div>
                    </div>
                    <div class="mb-3"><label>Location</label><input type="text" name="location" value="{{ asset[6] }}" class="form-control"></div>
                    <div class="mb-3"><label>Add Maintenance Log (History)</label>
                        <textarea name="maintenance_logs" class="form-control" rows="3" placeholder="Describe repair or upgrade done..."></textarea>
                    </div>
                    <button type="submit" class="btn btn-primary w-100">Update Asset</button>
                </form>
            </div>
        </div>
    </div>
</body>
</html>

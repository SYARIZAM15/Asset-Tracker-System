<edit html>
<html>
<head><link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"></head>
<body class="bg-light p-5">
    <div class="container" style="max-width: 600px;">
        {% with messages = get_flashed_messages() %}{% if messages %}{% for m in messages %}<div class="alert alert-danger">{{ m }}</div>{% endfor %}{% endif %}{% endwith %}
        <div class="card shadow border-0">
            <div class="card-header bg-warning text-dark fw-bold">📝 MODIFY ASSET: {{ asset.serial_number }}</div>
            <form method="POST" class="card-body p-4">
                <div class="mb-3"><label class="fw-bold">Asset Category</label>
                    <select name="asset_type" class="form-select">
                        <option value="Laptop" {% if asset.asset_type == 'Laptop' %}selected{% endif %}>Laptop</option>
                        <option value="PC" {% if asset.asset_type == 'PC' %}selected{% endif %}>PC</option>
                        <option value="Monitor" {% if asset.asset_type == 'Monitor' %}selected{% endif %}>Monitor</option>
                        <option value="Printer" {% if asset.asset_type == 'Printer' %}selected{% endif %}>Printer</option>
                    </select>
                </div>
                <div class="mb-3"><label class="fw-bold">Tracking Number</label><input type="text" name="tracking_number" value="{{ asset.tracking_number }}" class="form-control"></div>
                <div class="mb-3"><label class="fw-bold">Brand/Model</label><input type="text" name="cpu_name" value="{{ asset.cpu_name }}" class="form-control"></div>
                <div class="row g-3">
                    <div class="col-md-6"><label class="fw-bold">RAM</label><input list="ramOpt" name="ram_size" value="{{ asset.ram_size }}" class="form-control"></div>
                    <div class="col-md-6"><label class="fw-bold">Storage</label><input list="stOpt" name="storage_type" value="{{ asset.storage_type }}" class="form-control"></div>
                </div>
                <div class="mt-3"><label class="fw-bold">Agency</label><input type="text" name="location" value="{{ asset.location }}" class="form-control"></div>
                <div class="mt-3"><label class="fw-bold">Status</label>
                    <select name="status" class="form-select">
                        <option value="Working" {% if asset.status == 'Working' %}selected{% endif %}>Working</option>
                        <option value="Maintenance" {% if asset.status == 'Maintenance' %}selected{% endif %}>Maintenance</option>
                        <option value="Faulty" {% if asset.status == 'Faulty' %}selected{% endif %}>Faulty</option>
                    </select>
                </div>
                <hr>
                <h6 class="fw-bold text-primary">🛠️ Add Maintenance Log</h6>
                <select name="category" class="form-select mb-2"><option>Hardware Upgrade</option><option>Software Repair</option><option>General Service</option></select>
                <textarea name="action" class="form-control" rows="2" placeholder="Describe work done..."></textarea>
                <button type="submit" class="btn btn-primary w-100 mt-4 fw-bold">Update Asset & Logs</button>
            </form>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

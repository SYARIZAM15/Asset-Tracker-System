<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Asset - Assets Tracking</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="bg-light p-5">
    <div class="container" style="max-width: 650px;">

        <!-- Flash Message Reminder -->
        {% with messages = get_flashed_messages() %}
          {% if messages %}
            {% for message in messages %}
              <div class="alert alert-danger alert-dismissible fade show shadow-sm border-0 mb-4" role="alert">
                <div class="d-flex align-items-center">
                    <span class="fs-4 me-2">❌</span>
                    <div>{{ message }}</div>
                </div>
                <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
              </div>
            {% endfor %}
          {% endif %}
        {% endwith %}

        <div class="card shadow border-0">
            <div class="card-header bg-warning text-dark p-3">
                <h5 class="mb-0 fw-bold">📝 MODIFY ASSET: {{ asset.serial_number }}</h5>
            </div>
            <form method="POST" class="card-body p-4">
                <div class="mb-3">
                    <label class="fw-bold form-label">Asset Category</label>
                    <select name="asset_type" class="form-select">
                        <option value="Laptop" {% if asset.asset_type == 'Laptop' %}selected{% endif %}>Laptop</option>
                        <option value="PC" {% if asset.asset_type == 'PC' %}selected{% endif %}>PC</option>
                        <option value="Monitor" {% if asset.asset_type == 'Monitor' %}selected{% endif %}>Monitor</option>
                        <option value="Printer" {% if asset.asset_type == 'Printer' %}selected{% endif %}>Printer</option>
                    </select>
                </div>

                <div class="mb-3">
                    <label class="fw-bold form-label">Brand/Model</label>
                    <input type="text" name="cpu_name" value="{{ asset.cpu_name }}" class="form-control">
                </div>
                
                <div class="row g-3 mb-3">
                    <div class="col-md-6">
                        <label class="fw-bold form-label">RAM Size</label>
                        <input list="ramOptions" name="ram_size" value="{{ asset.ram_size }}" class="form-control">
                        <datalist id="ramOptions">
                            <option value="4GB"><option value="8GB"><option value="12GB"><option value="16GB"><option value="32GB">
                        </datalist>
                    </div>
                    <div class="col-md-6">
                        <label class="fw-bold form-label">Storage</label>
                        <input list="storageOptions" name="storage_type" value="{{ asset.storage_type }}" class="form-control">
                        <datalist id="storageOptions">
                            <option value="SSD 128GB"><option value="SSD 256GB"><option value="SSD 512GB"><option value="SSD 1TB">
                            <option value="HDD 500GB"><option value="HDD 1TB">
                        </datalist>
                    </div>
                </div>

                <div class="mb-3">
                    <label class="fw-bold form-label">Agency</label>
                    <input type="text" name="location" value="{{ asset.location }}" class="form-control">
                </div>

                <div class="mb-3">
                    <label class="fw-bold form-label">Status</label>
                    <select name="status" class="form-select">
                        <option value="Working" {% if asset.status == 'Working' %}selected{% endif %}>Working</option>
                        <option value="Maintenance" {% if asset.status == 'Maintenance' %}selected{% endif %}>Maintenance</option>
                        <option value="Faulty" {% if asset.status == 'Faulty' %}selected{% endif %}>Faulty</option>
                    </select>
                </div>

                <hr class="my-4">
                
                <h6 class="fw-bold text-primary mb-3">🛠️ Add Maintenance Log</h6>
                <div class="mb-2">
                    <select name="category" class="form-select mb-2">
                        <option>Hardware Upgrade</option>
                        <option>Software Repair</option>
                        <option>General Service</option>
                        <option>Cabling / Network</option>
                    </select>
                </div>
                <div class="mb-4">
                    <textarea name="action" class="form-control" rows="2" placeholder="Describe what was done..."></textarea>
                </div>

                <div class="d-grid gap-2">
                    <button type="submit" class="btn btn-primary fw-bold">Update Asset & Logs</button>
                    <a href="/" class="btn btn-outline-secondary">Cancel</a>
                </div>
            </form>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

<edit html>
<html>
<head><link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"></head>
<body class="bg-light p-5">
    <div class="container" style="max-width: 600px;">
        <div class="card shadow border-0">
            <div class="card-header bg-warning text-dark fw-bold">📝 MODIFY ASSET: {{ asset.serial_number }}</div>
            <form method="POST" class="card-body p-4">
                <div class="mb-3"><label class="fw-bold">Asset Category</label>
                    <select name="asset_type" class="form-select">
                        <option value="Laptop" {% if asset.asset_type == 'Laptop' %}selected{% endif %}>Laptop</option>
                        <option value="PC" {% if asset.asset_type == 'PC' %}selected{% endif %}>PC</option>
                        <option value="Monitor" {% if asset.asset_type == 'Monitor' %}selected{% endif %}>Monitor</option>
                    </select>
                </div>
                <div class="mb-3"><label class="fw-bold">Brand/Model</label><input type="text" name="cpu_name" value="{{ asset.cpu_name }}" class="form-control"></div>
                <div class="mb-3"><label class="fw-bold">Status</label>
                    <select name="status" class="form-select">
                        <option value="Working" {% if asset.status == 'Working' %}selected{% endif %}>Working</option>
                        <option value="Maintenance" {% if asset.status == 'Maintenance' %}selected{% endif %}>Maintenance</option>
                        <option value="Faulty" {% if asset.status == 'Faulty' %}selected{% endif %}>Faulty</option>
                    </select>
                </div>
                <button type="submit" class="btn btn-primary w-100 mt-4 fw-bold">Update Asset</button>
                <a href="/" class="btn btn-link w-100 text-center mt-2 d-block">Back</a>
            </form>
        </div>
    </div>
</body>
</html>

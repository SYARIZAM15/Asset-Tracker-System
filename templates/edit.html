<edit html>
<html>
<head><link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"></head>
<body class="bg-light">
    <div class="card shadow border-0" style="max-width: 600px; margin: 50px auto;">
        <div class="card-header bg-warning text-dark fw-bold">📝 MODIFY ASSET: {{ asset.serial_number }}</div>
        <form method="POST" class="card-body p-4">
            <div class="mb-3"><label>CPU Name</label><input type="text" name="cpu_name" value="{{ asset.cpu_name }}" class="form-control"></div>
            <div class="row">
                <div class="col"><label>RAM Size</label><input type="text" name="ram_size" value="{{ asset.ram_size }}" class="form-control"></div>
                <div class="col"><label>Storage</label><input type="text" name="storage_type" value="{{ asset.storage_type }}" class="form-control"></div>
            </div>
            <div class="mt-3"><label>Location</label><input type="text" name="location" value="{{ asset.location }}" class="form-control"></div>
            <div class="mt-3">
                <label>Status</label>
                <select name="status" class="form-select">
                    <option value="Working" {% if asset.status == 'Working' %}selected{% endif %}>Working</option>
                    <option value="Maintenance" {% if asset.status == 'Maintenance' %}selected{% endif %}>Maintenance</option>
                    <option value="Faulty" {% if asset.status == 'Faulty' %}selected{% endif %}>Faulty</option>
                </select>
            </div>
            <hr>
            <h6>Maintenance Log History</h6>
            <select name="category" class="form-select mb-2">
                <option>Hardware Upgrade</option>
                <option>Software Repair</option>
                <option>General Service</option>
            </select>
            <textarea name="action" class="form-control" rows="2" placeholder="Action taken..."></textarea>
            <button type="submit" class="btn btn-primary w-100 mt-4">Update Asset & Save Log</button>
        </form>
    </div>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
    <title>JTDI Login</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>body { background: #1a2a6c; height: 100vh; display: flex; align-items: center; justify-content: center; }</style>
</head>
<body>
    <div class="bg-white p-5 rounded-4 shadow" style="width: 100%; max-width: 400px;">
        <h3 class="text-center fw-bold mb-4">JTDI LOGIN</h3>
        {% with messages = get_flashed_messages() %}{% if messages %}{% for m in messages %}<div class="alert alert-danger">{{ m }}</div>{% endfor %}{% endif %}{% endwith %}
        <form method="POST">
            <div class="mb-3"><label class="small fw-bold">Email Address</label><input type="email" name="email" class="form-control" required placeholder="staff@jtdi.gov.my"></div>
            <div class="mb-4"><label class="small fw-bold">Password</label><input type="password" name="password" class="form-control" required placeholder="••••••••"></div>
            <button type="submit" class="btn btn-primary w-100 py-2 fw-bold">SIGN IN</button>
        </form>
    </div>
</body>
</html>

<login html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>JTDI Login</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        body { background: linear-gradient(135deg, #1a2a6c 0%, #2c5364 100%); height: 100vh; display: flex; align-items: center; justify-content: center; }
        .login-card { background: white; padding: 40px; border-radius: 20px; width: 100%; max-width: 400px; border-top: 5px solid #ffc107; }
    </style>
</head>
<body>
    <div class="login-card shadow">
        <h2 class="text-center fw-bold" style="color:#1a2a6c">JTDI</h2>
        <p class="text-center text-muted small mb-4">Asset Management Portal</p>
        
        {% with messages = get_flashed_messages() %}
            {% if messages %}{% for m in messages %}<div class="alert alert-danger py-2 small text-center">{{ m }}</div>{% endfor %}{% endif %}
        {% endwith %}

        <form method="POST">
            <div class="mb-3">
                <label class="form-label small fw-bold">Login Email</label>
                <input type="email" name="email" class="form-control" placeholder="staff@jtdi.gov.my" required autofocus>
            </div>
            <div class="mb-4">
                <label class="form-label small fw-bold">Password</label>
                <input type="password" name="password" class="form-control" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn btn-primary w-100 fw-bold py-2">SECURE SIGN IN</button>
        </form>
    </div>
</body>
</html>

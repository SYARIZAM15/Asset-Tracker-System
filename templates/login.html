<login html>
<html lang="en">
<head><title>System Logs</title><link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"></head>
<body class="bg-light">
    <nav class="navbar navbar-dark bg-dark p-3 mb-4"><div class="container d-flex justify-content-between">
            <h4 class="text-white mb-0">📜 LOGIN HISTORY</h4><a href="{{ url_for('index') }}" class="btn btn-warning fw-bold">Back to Dashboard</a>
    </div></nav>
    <div class="container"><div class="card shadow border-0 p-4 rounded-4"><table class="table table-hover">
        <thead class="table-dark"><tr><th>Name</th><th>Email</th><th>Time</th></tr></thead>
        <tbody>{% for log in logs %}<tr><td>{{ log.full_name }}</td><td>{{ log.email }}</td><td>{{ log.login_time }}</td></tr>{% endfor %}</tbody>
    </table></div></div>
</body>
</html>

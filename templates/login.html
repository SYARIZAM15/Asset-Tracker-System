<!DOCTYPE html>
<html>
<head>
    <title>Login - JTDI Tracker</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        body { background: #1a2a6c; display: flex; align-items: center; justify-content: center; height: 100vh; }
        .card { width: 350px; border-radius: 15px; }
    </style>
</head>
<body>
    <div class="card shadow-lg p-4">
        <h4 class="text-center fw-bold mb-4">JTDI LOGIN</h4>
        
        {% with messages = get_flashed_messages() %}
            {% if messages %}
                {% for m in messages %}<div class="alert alert-danger small">{{ m }}</div>{% endfor %}
            {% endif %}
        {% endwith %}

        <form method="POST" autocomplete="off">
            <div class="mb-3">
                <label class="small fw-bold">Email Address</label>
                <input type="email" name="email" class="form-control" required placeholder="name@jtdi.gov.my">
            </div>
            <div class="mb-3">
                <label class="small fw-bold">Password</label>
                <input type="password" name="password" class="form-control" required placeholder="********">
            </div>
            <button type="submit" class="btn btn-primary w-100 fw-bold">Login to System</button>
        </form>
    </div>
</body>
</html>

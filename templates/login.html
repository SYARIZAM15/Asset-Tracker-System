<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>JTDI Login</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>body { background-color: #1a2a6c; height: 100vh; display: flex; align-items: center; justify-content: center; }</style>
</head>
<body>
    <div class="card shadow p-4" style="width: 400px;">
        <h3 class="text-center fw-bold mb-4">Staff Portal</h3>
        <form method="POST">
            <div class="mb-3">
                <label class="form-label fw-bold">Staff ID / Name</label>
                <input type="text" name="username" class="form-control" placeholder="Enter name" required>
            </div>
            <button type="submit" class="btn btn-primary w-100 fw-bold py-2">Sign In</button>
        </form>
    </div>
</body>
</html>

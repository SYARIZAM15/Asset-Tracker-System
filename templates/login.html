<login html>
<html lang="en">
<head><title>Login</title><link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"></head>
<body class="bg-dark d-flex align-items-center" style="height: 100vh;">
    <div class="card mx-auto p-4 shadow" style="width: 350px;">
        <h4 class="text-center mb-4 text-primary">JPKN ASSET LOGIN</h4>
        <hr>
        {% with msgs = get_flashed_messages() %}{% if msgs %}<p class="text-danger small text-center">{{ msgs[0] }}</p>{% endif %}{% endwith %}
        <form method="POST">
            <div class="mb-3">
                <input type="text" name="username" class="form-control" placeholder="Username" required>
            </div>
            <div class="mb-4">
                <input type="password" name="password" class="form-control" placeholder="Password" required>
            </div>
            <button type="submit" class="btn btn-primary w-100">Enter System</button>
        </form>
        <p class="mt-3 text-center text-muted small">Authorized Access Only</p>
    </div>
</body>
</html>

<login html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>JTDI Logs</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        :root { --navy: #1a2a6c; --gold: #ffc107; }
        .header { background: var(--navy); color: white; padding: 20px; border-bottom: 4px solid var(--gold); }
    </style>
</head>
<body class="bg-light">
    <div class="header shadow-sm mb-4">
        <div class="container d-flex justify-content-between align-items-center">
            <h4 class="mb-0 fw-bold">📜 SYSTEM ACCESS LOGS</h4>
            <a href="{{ url_for('index') }}" class="btn btn-warning fw-bold shadow-sm">Back to Dashboard</a>
        </div>
    </div>
    <div class="container">
        <div class="card shadow border-0 p-4 rounded-4">
            <div class="table-responsive">
                <table class="table table-hover align-middle">
                    <thead class="table-dark">
                        <tr><th>Staff Name</th><th>Email</th><th>Login Time</th></tr>
                    </thead>
                    <tbody>
                        {% for log in logs %}
                        <tr>
                            <td class="fw-bold">{{ log.full_name }}</td>
                            <td>{{ log.email }}</td>
                            <td>{{ log.login_time.strftime('%Y-%m-%d | %I:%M %p') }}</td>
                        </tr>
                        {% endfor %}
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</body>
</html>

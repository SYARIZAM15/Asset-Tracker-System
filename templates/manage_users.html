<!DOCTYPE html>
<html>
<head>
    <title>Manage Users</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">
    <nav class="navbar navbar-dark bg-dark p-3 mb-4">
        <div class="container d-flex justify-content-between">
            <span class="navbar-brand">User Management</span>
            <a href="/" class="btn btn-outline-light">Back</a>
        </div>
    </nav>
    <div class="container">
        <div class="row">
            <div class="col-md-4">
                <div class="card p-3 shadow-sm">
                    <h5>Register New User</h5>
                    <form method="POST">
                        <input type="text" name="full_name" placeholder="Full Name" class="form-control mb-2" required>
                        <input type="text" name="username" placeholder="Username" class="form-control mb-2" required>
                        <input type="email" name="email" placeholder="Email" class="form-control mb-2" required>
                        <input type="password" name="password" placeholder="Password" class="form-control mb-2" required>
                        <select name="role" class="form-select mb-3">
                            <option value="User">User</option>
                            <option value="Admin">Admin</option>
                        </select>
                        <button type="submit" class="btn btn-primary w-100">Create</button>
                    </form>
                </div>
            </div>
            <div class="col-md-8">
                <div class="card shadow-sm">
                    <table class="table align-middle mb-0">
                        <thead><tr><th>Name</th><th>Email</th><th>Role</th><th>Actions</th></tr></thead>
                        <tbody>
                            {% for u in users %}
                            <tr>
                                <td>{{ u.full_name }}</td>
                                <td>{{ u.email }}</td>
                                <td>{{ u.role }}</td>
                                <td>
                                    <div class="btn-group">
                                        <a href="/admin/edit_user/{{ u.id }}" class="btn btn-sm btn-outline-primary">Edit</a>
                                        <form action="/admin/delete_user/{{ u.id }}" method="POST" onsubmit="return confirm('Delete user?');">
                                            <button type="submit" class="btn btn-sm btn-outline-danger">Del</button>
                                        </form>
                                    </div>
                                </td>
                            </tr>
                            {% endfor %}
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</body>
</html>

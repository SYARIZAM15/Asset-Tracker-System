<!DOCTYPE html>
<html>
<head><title>Manage Staff</title><link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"></head>
<body class="bg-light">
    <nav class="navbar navbar-dark bg-dark p-3"><div class="container"><a class="navbar-brand fw-bold" href="/">Back to Dashboard</a></div></nav>
    <div class="container mt-4">
        <div class="card p-4 shadow-sm border-0" style="max-width: 500px; margin: auto;">
            <h5 class="fw-bold mb-3 text-center">Register New Staff</h5>
            <form method="POST">
                <input type="text" name="full_name" placeholder="Full Name" class="form-control mb-2" required>
                <input type="text" name="username" placeholder="Username" class="form-control mb-2" required>
                <input type="email" name="email" placeholder="Email Address" class="form-control mb-2" required>
                <input type="password" name="password" placeholder="Password" class="form-control mb-2" required>
                <select name="role" class="form-select mb-3"><option value="User">User</option><option value="Admin">Admin</option></select>
                <button class="btn btn-primary w-100 fw-bold">Add Staff Member</button>
            </form>
        </div>
    </div>
</body>
</html>

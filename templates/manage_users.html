<manage_user html>
<html>
<head><title>User Management</title><link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"></head>
<body class="bg-light">
    <nav class="navbar navbar-dark bg-dark p-3"><div class="container"><a class="navbar-brand fw-bold" href="/">Back to Dashboard</a></div></nav>
    <div class="container mt-4">
        <div class="row">
            <div class="col-md-4">
                <div class="card p-4 shadow-sm">
                    <h5 class="fw-bold mb-3">Add Staff</h5>
                    <form method="POST">
                        <input type="text" name="full_name" placeholder="Full Name" class="form-control mb-2" required>
                        <input type="text" name="username" placeholder="Username" class="form-control mb-2" required>
                        <input type="email" name="email" placeholder="Email" class="form-control mb-2" required>
                        <input type="password" name="password" placeholder="Password" class="form-control mb-2" required>
                        <select name="role" class="form-select mb-3"><option>User</option><option>Admin</option></select>
                        <button class="btn btn-primary w-100 fw-bold">Add Staff</button>
                    </form>
                </div>
            </div>
            <div class="col-md-8">
                <div class="card p-4 shadow-sm">
                    <h5 class="fw-bold mb-3">System Accounts</h5>
                    <table class="table">
                        <thead><tr><th>Name</th><th>Email</th><th>Role</th><th>Action</th></tr></thead>
                        <tbody>
                            {% for u in users %}
                            <tr><td>{{ u.full_name }}</td><td>{{ u.email }}</td><td>{{ u.role }}</td>
                                <td>{% if u.username != session.user %}<form action="/admin/delete_user/{{ u.id }}" method="POST"><button class="btn btn-sm btn-danger">Del</button></form>{% endif %}</td>
                            </tr>
                            {% endfor %}
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
    <title>Manage Staff</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">
    <nav class="navbar navbar-dark bg-dark p-3 mb-4"><div class="container d-flex justify-content-between"><h4 class="text-white mb-0">USER MANAGEMENT</h4><a href="/" class="btn btn-warning btn-sm">Back</a></div></nav>
    <div class="container">
        <div class="row g-4">
            <div class="col-md-4">
                <div class="card p-4 shadow border-0">
                    <h5 class="fw-bold">Register Staff</h5>
                    <form method="POST">
                        <input type="text" name="full_name" placeholder="Full Name" class="form-control mb-2" required>
                        <input type="text" name="username" placeholder="Username" class="form-control mb-2" required>
                        <input type="email" name="email" placeholder="Email" class="form-control mb-2" required>
                        <input type="password" name="password" placeholder="Password" class="form-control mb-2" required>
                        <select name="role" class="form-select mb-3"><option value="User">User</option><option value="Admin">Admin</option></select>
                        <button class="btn btn-primary w-100">Add Staff</button>
                    </form>
                </div>
            </div>
            <div class="col-md-8">
                <div class="card shadow border-0">
                    <div class="card-header bg-dark text-white fw-bold">Active Staff Directory</div>
                    <table class="table table-hover align-middle">
                        <thead><tr><th>Name</th><th>Email</th><th>Role</th><th class="text-center">Action</th></tr></thead>
                        <tbody>
                            {% for u in users %}
                            <tr>
                                <td><span class="fw-bold text-primary">{{ u.full_name }}</span><br><small class="text-muted">@{{ u.username }}</small></td>
                                <td>{{ u.email }}</td>
                                <td><span class="badge {{ 'bg-warning text-dark' if u.role == 'Admin' else 'bg-info text-white' }}">{{ u.role }}</span></td>
                                <td class="text-center">
                                    {% if u.username != session.user %}<form action="/admin/delete_user/{{ u.id }}" method="POST"><button class="btn btn-sm btn-outline-danger">Remove</button></form>{% else %}<span class="badge bg-secondary">Current</span>{% endif %}
                                </td>
                            </tr>
                            {% endfor %}
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
    <title>Staff Management - JTDI</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>:root{--navy:#1a2a6c;--gold:#ffc107;} .navbar{background:var(--navy); border-bottom:4px solid var(--gold);}</style>
</head>
<body class="bg-light">
    <nav class="navbar navbar-dark p-3 mb-4 shadow"><div class="container d-flex justify-content-between align-items-center">
        <h4 class="text-white mb-0 fw-bold">USER MANAGEMENT</h4>
        <a href="/" class="btn btn-warning fw-bold">Back to Dashboard</a>
    </div></nav>

    <div class="container">
        <div class="row g-4">
            <div class="col-md-4">
                <div class="card p-4 shadow border-0 rounded-4">
                    <h5 class="fw-bold mb-3">Add New Account</h5>
                    <form method="POST">
                        <input type="text" name="full_name" placeholder="Full Name" class="form-control mb-2" required>
                        <input type="text" name="username" placeholder="Username" class="form-control mb-2" required>
                        <input type="email" name="email" placeholder="Email" class="form-control mb-2" required>
                        <input type="password" name="password" placeholder="Password" class="form-control mb-2" required>
                        <select name="role" class="form-select mb-3">
                            <option value="User">User</option>
                            <option value="Admin">Admin</option>
                        </select>
                        <button class="btn btn-primary w-100 fw-bold">Register Staff</button>
                    </form>
                </div>
            </div>
            <div class="col-md-8">
                <div class="card shadow border-0 rounded-4 overflow-hidden">
                    <table class="table table-hover align-middle mb-0">
                        <thead class="table-dark"><tr><th>Name</th><th>Role</th><th class="text-center">Action</th></tr></thead>
                        <tbody>
                            {% for u in users %}
                            <tr>
                                <td><b>{{ u.full_name }}</b><br><small class="text-muted">{{ u.email }}</small></td>
                                <td><span class="badge {% if u.role == 'Admin' %}bg-danger{% else %}bg-info{% endif %}">{{ u.role }}</span></td>
                                <td class="text-center">
                                    <div class="btn-group">
                                        <a href="{{ url_for('edit_user', id=u.id) }}" class="btn btn-sm btn-outline-dark">Edit</a>
                                        {% if u.username != session.user %}
                                        <form action="{{ url_for('delete_user', id=u.id) }}" method="POST" class="d-inline">
                                            <button class="btn btn-sm btn-outline-danger" onclick="return confirm('Delete user?')">Del</button>
                                        </form>
                                        {% endif %}
                                    </div>
                                </td>
                            </tr>
                            {% endfor %}
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</body>
</html>

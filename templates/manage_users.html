<!DOCTYPE html>
<html>
<head>
    <title>Staff Management - JTDI</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>:root{--navy:#1a2a6c;--gold:#ffc107;} .navbar{background:var(--navy); border-bottom:4px solid var(--gold);}</style>
</head>
<body class="bg-light">
    <nav class="navbar navbar-dark p-3 mb-4 shadow"><div class="container d-flex justify-content-between">
        <h4 class="text-white mb-0 fw-bold">USER MANAGEMENT</h4>
        <a href="/" class="btn btn-warning fw-bold">Back to Dashboard</a>
    </div></nav>
    <div class="container"><div class="row g-4">
        <div class="col-md-4">
            <div class="card p-4 shadow border-0 rounded-4">
                <h5 class="fw-bold mb-3">Register Staff</h5>
                <form method="POST">
                    <input type="text" name="full_name" placeholder="Full Name" class="form-control mb-2" required>
                    <input type="text" name="username" placeholder="Username" class="form-control mb-2" required>
                    <input type="email" name="email" placeholder="Email" class="form-control mb-2" required>
                    <input type="password" name="password" placeholder="Password" class="form-control mb-2" required>
                    <select name="role" class="form-select mb-3"><option value="User">User</option><option value="Admin">Admin</option></select>
                    <button class="btn btn-primary w-100">Add Staff</button>
                </form>
            </div>
        </div>
        <div class="col-md-8">
            <div class="card shadow border-0 rounded-4 overflow-hidden">
                <div class="card-header bg-dark text-white fw-bold">Active Staff List</div>
                <table class="table table-hover align-middle mb-0">
                    <thead class="table-light"><tr><th>Name</th><th>Role</th><th>Email</th></tr></thead>
                    <tbody>
                        {% for u in users %}
                        <tr>
                            <td><b>{{ u.full_name }}</b><br><small class="text-muted">@{{ u.username }}</small></td>
                            <td><span class="badge bg-info">{{ u.role }}</span></td>
                            <td>{{ u.email }}</td>
                        </tr>
                        {% endfor %}
                    </tbody>
                </table>
            </div>
        </div>
    </div></div>
</body>
</html>

<manage_users html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>JTDI - User Management</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        :root { --jtdi-navy: #1a2a6c; --jtdi-gold: #ffc107; }
        body { background-color: #f8f9fa; }
        .header { background: var(--jtdi-navy); color: white; padding: 20px; border-bottom: 4px solid var(--jtdi-gold); }
    </style>
</head>
<body>
    <div class="header shadow mb-4">
        <div class="container d-flex justify-content-between align-items-center">
            <h4 class="mb-0 fw-bold">⚙️ SYSTEM ADMINISTRATION</h4>
            <a href="/" class="btn btn-warning btn-sm fw-bold">Back to Dashboard</a>
        </div>
    </div>
    <div class="container">
        <div class="row g-4">
            <div class="col-lg-4">
                <div class="card shadow p-4 border-0 rounded-3">
                    <h5 class="fw-bold text-primary mb-3">Register New Staff</h5>
                    <form method="POST">
                        <div class="mb-2"><label class="small fw-bold">Full Name</label><input type="text" name="full_name" class="form-control" required></div>
                        <div class="mb-2"><label class="small fw-bold">Username</label><input type="text" name="username" class="form-control" required></div>
                        <div class="mb-2"><label class="small fw-bold">Email</label><input type="email" name="email" class="form-control" required></div>
                        <div class="mb-2"><label class="small fw-bold">Password</label><input type="password" name="password" class="form-control" required></div>
                        <div class="mb-3"><label class="small fw-bold">Role</label>
                            <select name="role" class="form-select"><option value="User">User</option><option value="Admin">Admin</option></select>
                        </div>
                        <button type="submit" class="btn btn-primary w-100 fw-bold">Create Account</button>
                    </form>
                </div>
            </div>
            <div class="col-lg-8">
                <div class="card shadow p-4 border-0 rounded-3">
                    <h5 class="fw-bold text-primary mb-3">Active Accounts</h5>
                    <table class="table table-hover align-middle">
                        <thead class="table-light"><tr><th>Name</th><th>Email</th><th>Role</th><th class="text-end">Action</th></tr></thead>
                        <tbody>
                            {% for u in users %}
                            <tr>
                                <td><div class="fw-bold">{{ u.full_name }}</div><small class="text-muted">@{{ u.username }}</small></td>
                                <td class="small">{{ u.email }}</td>
                                <td><span class="badge {{ 'bg-danger' if u.role == 'Admin' else 'bg-primary' }}">{{ u.role }}</span></td>
                                <td class="text-end">
                                    {% if u.username != session.user %}
                                    <form action="/admin/delete_user/{{ u.id }}" method="POST" onsubmit="return confirm('Delete user?');">
                                        <button type="submit" class="btn btn-sm btn-outline-danger px-3">Delete</button>
                                    </form>
                                    {% endif %}
                                </td>
                            </tr>
                            {% endfor %}
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</body>
</html>

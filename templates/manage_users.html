<manage_users html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>JTDI - User Management</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        :root { --jtdi-navy: #1a2a6c; }
        body { background-color: #f8f9fa; }
        .admin-header { background: var(--jtdi-navy); color: white; padding: 20px; border-bottom: 5px solid #ffc107; }
    </style>
</head>
<body>
    <div class="admin-header shadow-sm mb-4">
        <div class="container d-flex justify-content-between align-items-center">
            <h3 class="mb-0 fw-bold">⚙️ USER MANAGEMENT PANEL</h3>
            <a href="/" class="btn btn-warning fw-bold">Back to Dashboard</a>
        </div>
    </div>

    <div class="container">
        <div class="row g-4">
            <div class="col-md-4">
                <div class="card shadow border-0 p-4">
                    <h5 class="fw-bold mb-3">Create New Account</h5>
                    <form method="POST">
                        <div class="mb-3">
                            <label class="small fw-bold">Username</label>
                            <input type="text" name="username" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label class="small fw-bold">Password</label>
                            <input type="password" name="password" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label class="small fw-bold">System Role</label>
                            <select name="role" class="form-select">
                                <option value="User">Standard User</option>
                                <option value="Admin">Administrator</option>
                            </select>
                        </div>
                        <button type="submit" class="btn btn-primary w-100 fw-bold">Register User</button>
                    </form>
                </div>
            </div>

            <div class="col-md-8">
                <div class="card shadow border-0 p-4">
                    <h5 class="fw-bold mb-3">Existing System Accounts</h5>
                    <div class="table-responsive">
                        <table class="table table-hover">
                            <thead class="table-light">
                                <tr><th>ID</th><th>Username</th><th>Role</th></tr>
                            </thead>
                            <tbody>
                                {% for u in users %}
                                <tr>
                                    <td>{{ u.id }}</td>
                                    <td class="fw-bold">{{ u.username }}</td>
                                    <td>
                                        <span class="badge {{ 'bg-danger' if u.role == 'Admin' else 'bg-primary' }}">
                                            {{ u.role }}
                                        </span>
                                    </td>
                                </tr>
                                {% endfor %}
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>

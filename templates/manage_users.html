<!DOCTYPE html>
<html>
<head>
    <title>Staff Management</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="bg-light p-4">
    <div class="container">
        <div class="d-flex justify-content-between mb-4">
            <h3>Staff Management</h3>
            <a href="/" class="btn btn-secondary">Back to Dashboard</a>
        </div>

        <div class="row">
            <div class="col-md-4">
                <div class="card p-3 shadow-sm">
                    <h5>Add New Staff Member</h5>
                    <form method="POST">
                        <input type="text" name="full_name" placeholder="Full Name" class="form-control mb-2" required>
                        <input type="text" name="username" placeholder="Username" class="form-control mb-2" required>
                        <input type="email" name="email" placeholder="Email" class="form-control mb-2" required>
                        <input type="password" name="password" placeholder="Password" class="form-control mb-2" required>
                        
                        <label class="small fw-bold">Account Role</label>
                        <select name="role" class="form-select mb-3">
                            <option value="User">Standard User</option>
                            <option value="Admin">Administrator</option>
                        </select>
                        
                        <button type="submit" class="btn btn-primary w-100">Create Account</button>
                    </form>
                </div>
            </div>

            <div class="col-md-8">
                <div class="table-responsive bg-white rounded shadow-sm">
                    <table class="table align-middle">
                        <thead class="table-dark">
                            <tr><th>Name</th><th>Role</th><th>Actions</th></tr>
                        </thead>
                        <tbody>
                            {% for u in users %}
                            <tr>
                                <td>{{ u.full_name }}<br><small class="text-muted">{{ u.email }}</small></td>
                                <td><span class="badge {% if u.role == 'Admin' %}bg-danger{% else %}bg-info{% endif %}">{{ u.role }}</span></td>
                                <td>
                                    <div class="btn-group">
                                        <a href="{{ url_for('edit_user', id=u.id) }}" class="btn btn-sm btn-outline-dark">Edit</a>
                                        {% if u.username != session.user %}
                                        <form action="{{ url_for('delete_user', id=u.id) }}" method="POST" class="d-inline">
                                            <button class="btn btn-sm btn-outline-danger">Del</button>
                                        </form>
                                        {% endif %}
                                    </div>
                                </td>
                            </tr>
                            {% endfor %}
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><title>JTDI Asset Tracker</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        :root { --jtdi-navy: #1a2a6c; --jtdi-gold: #ffc107; }
        .navbar { background: var(--jtdi-navy); border-bottom: 4px solid var(--jtdi-gold); }
        .card-stats { border: none; border-radius: 15px; color: white; transition: 0.3s; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
    </style>
</head>
<body class="bg-light">
    <nav class="navbar navbar-dark mb-4 p-3 shadow">
        <div class="container d-flex justify-content-between align-items-center">
            <a class="navbar-brand fw-bold" href="/">JTDI ASSET TRACKER</a>
            <div class="text-white small">
                User: <span class="badge bg-warning text-dark">{{ session.full_name }}</span>
                <a href="/logout" class="btn btn-outline-light btn-sm ms-3">Sign Out</a>
            </div>
        </div>
    </nav>
    <div class="container">
        <div class="row g-4 mb-5 text-center">
            <div class="col-md-3"><div class="card card-stats p-4 bg-primary"><h6>Total</h6><h2>{{ total }}</h2></div></div>
            <div class="col-md-3"><div class="card card-stats p-4 bg-success"><h6>Working</h6><h2>{{ working }}</h2></div></div>
            <div class="col-md-3"><div class="card card-stats p-4 bg-warning text-dark"><h6>Maintenance</h6><h2>{{ maint }}</h2></div></div>
            <div class="col-md-3"><div class="card card-stats p-4 bg-danger"><h6>Faulty</h6><h2>{{ faulty }}</h2></div></div>
        </div>
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h4 class="fw-bold">Inventory List</h4>
            <div class="btn-group">
                {% if session.role == 'Admin' %}<a href="/admin/users" class="btn btn-warning fw-bold">USERS</a><a href="/admin/logs" class="btn btn-info text-white fw-bold">LOGS</a>{% endif %}
                <a href="/add" class="btn btn-success fw-bold">+ NEW ENTRY</a>
            </div>
        </div>
        </div>
</body>
</html>

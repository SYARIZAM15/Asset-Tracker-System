<!DOCTYPE html>
<html>
<head>
    <title>All Assets</title>
</head>
<body>

<h2>All Assets</h2>

<a href="/">➕ Add Asset</a>

<br><br>

<table border="1" cellpadding="10">
    <tr>
        <th>ID</th>
        <th>CPU Name</th>
        <th>Serial Number</th>
        <th>Status</th>
        <th>Last Updated</th>
        <th>Action</th>
    </tr>

    {% for row in data %}
    <tr>
        <td>{{ row[0] }}</td>
        <td>{{ row[1] }}</td>
        <td>{{ row[2] }}</td>
        <td>{{ row[3] }}</td>
        <td>{{ row[5] }}</td>
        <td>
            <a href="/asset/{{ row[0] }}">View</a>
        </td>
    </tr>
    {% endfor %}

</table>

</body>
</html>

<assets html>
<html lang="en">
<head>
    <meta charset="UTF-8"><title>Inventory Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container mt-5">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2>📦 Asset Management</h2>
            <div>
                <a href="/logout" class="btn btn-outline-danger btn-sm">Logout</a>
                <a href="/add" class="btn btn-primary">+ Add Hardware</a>
            </div>
        </div>
        
        <div class="row mb-4 text-center">
            <div class="col-md-4"><div class="card bg-dark text-white p-3"><h6>Total: {{ total }}</h6></div></div>
            <div class="col-md-4"><div class="card bg-success text-white p-3"><h6>Working: {{ working }}</h6></div></div>
            <div class="col-md-4"><div class="card bg-danger text-white p-3"><h6>Faulty: {{ faulty }}</h6></div></div>
        </div>

        <form method="GET" class="row g-2 mb-4 bg-white p-3 rounded shadow-sm">
            <div class="col-md-3">
                <select name="status" class="form-select">
                    <option value="">All Status</option>
                    <option value="Working">Working</option>
                    <option value="Faulty">Faulty</option>
                    <option value="Maintenance">Maintenance</option>
                </select>
            </div>
            <div class="col-md-3">
                <select name="location" class="form-select">
                    <option value="">All Locations</option>
                    {% for loc in locations %}<option value="{{ loc }}">{{ loc }}</option>{% endfor %}
                </select>
            </div>
            <div class="col-md-4"><input type="text" name="search" class="form-control" placeholder="Search S/N or Name"></div>
            <div class="col-md-2"><button type="submit" class="btn btn-primary w-100">Filter</button></div>
        </form>

        <div class="table-responsive bg-white p-3 shadow-sm rounded">
            <table class="table table-hover align-middle">
                <thead class="table-dark">
                    <tr>
                        <th>CPU Name</th>
                        <th>S/N</th>
                        <th>Status</th>
                        <th>Location</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody>
                    {% for row in data %}
                    <tr>
                        <td>{{ row.cpu_name }}</td>
                        <td><code>{{ row.serial_number }}</code></td>
                        <td>
                            <span class="badge {% if row.status == 'Working' %}bg-success{% elif row.status == 'Faulty' %}bg-danger{% else %}bg-warning{% endif %}">
                                {{ row.status }}
                            </span>
                        </td>
                        <td>{{ row.location }}</td>
                        <td>
                            <a href="/asset/{{ row.id }}" class="btn btn-sm btn-info text-white">View</a>
                            <a href="/qr/{{ row.id }}" class="btn btn-sm btn-dark text-white">QR</a>
                            <a href="/delete/{{ row.id }}" class="btn btn-sm btn-outline-danger" onclick="return confirm('Confirm delete?')">Del</a>
                        </td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
</body>
</html>

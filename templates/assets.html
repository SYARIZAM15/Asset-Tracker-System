<div class="container mt-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>🖥️ IT Asset Management</h2>
        <div>
            <a href="/export" class="btn btn-outline-success me-2">📥 Export Excel</a>
            <a href="/" class="btn btn-primary">+ Add Asset</a>
        </div>
    </div>

    <!-- STATS CARDS -->
    <div class="row mb-4">
        <div class="col-md-4">
            <div class="card bg-primary text-white shadow-sm">
                <div class="card-body">
                    <h6>Total Assets</h6>
                    <h2>{{ total }}</h2>
                </div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card bg-success text-white shadow-sm">
                <div class="card-body">
                    <h6>Working</h6>
                    <h2>{{ working }}</h2>
                </div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card bg-danger text-white shadow-sm">
                <div class="card-body">
                    <h6>Faulty</h6>
                    <h2>{{ faulty }}</h2>
                </div>
            </div>
        </div>
    </div>

    <!-- SEARCH & TABLE (Keep your existing search/table code here) -->
</div>

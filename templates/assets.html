<assets html>
<html>
<head>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        .stat-card { padding: 20px; border-radius: 8px; color: white; text-align: center; font-weight: bold; }
        .bg-black { background: #212529; } .bg-green { background: #198754; } .bg-red { background: #dc3545; }
    </style>
</head>
<body class="p-5 bg-light">
    <div class="container bg-white p-4 rounded shadow">
        <div class="d-flex justify-content-between align-items-center">
            <h3 class="fw-bold">ASSETS TRACKING</h3>
            <div>
                <a href="/export" class="btn btn-success btn-sm">📊 Export CSV</a>
                <a href="/logout" class="btn btn-outline-danger btn-sm">Logout</a>
                <a href="/add" class="btn btn-primary btn-sm">+ Add Hardware</a>
            </div>
        </div>
        <div class="row mt-4">
            <div class="col"><div class="stat-card bg-black">Total: {{ total }}</div></div>
            <div class="col"><div class="stat-card bg-green">Working: {{ working }}</div></div>
            <div class="col"><div class="stat-card bg-red">Faulty: {{ faulty }}</div></div>
        </div>
        <table class="table mt-4 table-hover">
            <thead class="table-dark">
                <tr><th>CPU Name</th><th>S/N</th><th>Status</th><th>Location</th><th>Action</th></tr>
            </thead>
            <tbody>
                {% for row in data %}
                <tr>
                    <td>{{ row.cpu_name }}</td>
                    <td><code>{{ row.serial_number }}</code></td>
                    <td><span class="badge {{ 'bg-success' if row.status == 'Working' else 'bg-danger' }}">{{ row.status }}</span></td>
                    <td>{{ row.location }}</td>
                    <td>
                        <a href="/asset/{{ row.id }}" class="btn btn-sm btn-info">View</a>
                        <a href="/edit/{{ row.id }}" class="btn btn-sm btn-warning">Edit</a>
                        <a href="/qr/{{ row.id }}" class="btn btn-sm btn-dark">QR</a>
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</body>
</html>

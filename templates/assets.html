<!-- Add jQuery to the <head> section -->
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

<!-- Updated Stats Row -->
<div class="row mt-4">
    <div class="col"><div class="stat-card bg-black">Total: {{ total }}</div></div>
    <div class="col"><div class="stat-card bg-green">Working: {{ working }}</div></div>
    <div class="col"><div class="stat-card bg-warning text-dark">Maintenance: {{ maintenance }}</div></div>
    <div class="col"><div class="stat-card bg-red">Faulty: {{ faulty }}</div></div>
</div>

<!-- NEW: Search Input -->
<div class="mt-4">
    <input type="text" id="liveSearch" class="form-control" placeholder="Live search by Serial, CPU, or Location...">
</div>

<!-- Add id="assetTable" to your <tbody> -->
<tbody id="assetTable">
    {% for row in data %}
    <tr>
        <td>{{ row.cpu_name }}</td>
        <td><code>{{ row.serial_number }}</code></td>
        <td>
            <span class="badge 
                {% if row.status == 'Working' %}bg-success
                {% elif row.status == 'Maintenance' %}bg-warning text-dark
                {% else %}bg-danger{% endif %}">
                {{ row.status }}
            </span>
        </td>
        <td>{{ row.location }}</td>
        <!-- ... Action buttons ... -->
    </tr>
    {% endfor %}
</tbody>

<!-- NEW: JavaScript at the bottom of the file -->
<script>
    $(document).ready(function(){
        $("#liveSearch").on("keyup", function() {
            var value = $(this).val().toLowerCase();
            $("#assetTable tr").filter(function() {
                $(this).toggle($(this).text().toLowerCase().indexOf(value) > -1)
            });
        });
    });
</script>

<!DOCTYPE html>
<html>
<head>
    <title>Edit User</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="bg-light p-5">
    <div class="container" style="max-width: 500px;">
        <div class="card p-4 shadow border-0">
            <h4 class="mb-4">Edit User: {{ user.username }}</h4>
            <form method="POST">
                <label class="small fw-bold">Full Name</label>
                <input type="text" name="full_name" value="{{ user.full_name }}" class="form-control mb-3" required>
                
                <label class="small fw-bold">Username</label>
                <input type="text" name="username" value="{{ user.username }}" class="form-control mb-3" required>
                
                <label class="small fw-bold">Email</label>
                <input type="email" name="email" value="{{ user.email }}" class="form-control mb-3" required>
                
                <label class="small fw-bold">Role</label>
                <select name="role" class="form-select mb-3">
                    <option value="User" {% if user.role == 'User' %}selected{% endif %}>User</option>
                    <option value="Admin" {% if user.role == 'Admin' %}selected{% endif %}>Admin</option>
                </select>

                <label class="small fw-bold">New Password (Leave blank to keep current)</label>
                <input type="password" name="password" class="form-control mb-4">

                <div class="btn-group w-100">
                    <button type="submit" class="btn btn-primary">Save Changes</button>
                    <a href="/admin/users" class="btn btn-secondary">Cancel</a>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
